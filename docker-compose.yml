services:
  ros1-client:
    build:
      context: .
      dockerfile: docker/ros1/Dockerfile
    container_name: go2-ros1-client
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI}
      - ROS_IP=${ROS_IP}
      - ROS_HOSTNAME=${ROS_HOSTNAME}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - ./:/ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
